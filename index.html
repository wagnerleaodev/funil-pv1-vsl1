<script>
var cmtLoaded = false;

// Reveal comments só após interação humana (esconde testimonials do crawler)
function loadComments(){
  if(cmtLoaded) return; cmtLoaded = true;
  try{
    var el = document.getElementById('cmt-list');
    if(!el || !el.dataset.c) return;
    el.innerHTML = decodeURIComponent(escape(atob(el.dataset.c)));
  }catch(e){}
}

['mousemove','scroll','touchstart','keydown'].forEach(function(ev){
  addEventListener(ev, function(){ setTimeout(loadComments, 800); }, {once:true, passive:true});
});
setTimeout(loadComments, 8000); // fallback a11y

function runDynamic(){
  // Dynamic date — deferred to requestIdleCallback (zero TBT impact)
  function updateDate(){
    try{
      var dateEl = document.getElementById('warnDate');
      if(dateEl){
        dateEl.textContent = new Intl.DateTimeFormat('fr-FR', {year:'numeric',month:'2-digit',day:'2-digit'}).format(new Date());
      }
    }catch(e){}
  }
  if (window.requestIdleCallback) {
    requestIdleCallback(updateDate, { timeout: 1500 });
  } else {
    setTimeout(updateDate, 50);
  }

  // Live-viewers ticker — varia a cada 3-8s com delta pequeno
  try{
    var v = document.getElementById('viewersCount');
    if(v){
      var current = Math.floor(Math.random()*(700-400+1))+400;
      v.textContent = current;
      function tickViewers(){
        var delta = Math.floor(Math.random()*7) - 3;
        current = Math.max(400, Math.min(700, current + delta));
        v.textContent = current;
        setTimeout(tickViewers, (3 + Math.random()*5) * 1000);
      }
      setTimeout(tickViewers, (3 + Math.random()*5) * 1000);
    }
  }catch(e){}
}

if(document.readyState === 'loading'){
  document.addEventListener('DOMContentLoaded', runDynamic);
} else {
  runDynamic();
}
</script>
